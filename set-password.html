<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة المرور - قريب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #1e3a8a;
            font-size: 32px;
        }
        .logo p {
            color: #6b7280;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .info {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🧰 قريب</h1>
            <p>عيّن كلمة المرور الخاصة بك</p>
        </div>
        
        <form id="setPasswordForm">
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="مثال: 24661499" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <input type="password" id="password" placeholder="6 أحرف على الأقل" minlength="6" required>
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">تعيين كلمة المرور</button>
        </form>
        
        <div id="message" class="message"></div>
        <div class="info">
            بعد التعيين، يمكنك تسجيل الدخول والبدء في استقبال الطلبات
        </div>
    </div>

    <script>
        const API_URL = 'https://qareeb-backend-ehvw.onrender.com/api';
        
        document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            // التحقق
            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'كلمة المرور غير متطابقة';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري التعيين...';
            
            try {
                const response = await fetch(`${API_URL}/auth/set-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ تم تعيين كلمة المرور بنجاح! يمكنك الآن تسجيل الدخول.';
                    document.getElementById('setPasswordForm').reset();
                    
                    // تحويل إلى صفحة تسجيل الدخول بعد 3 ثوان
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error || 'رقم الهاتف غير موجود أو تم تعيين كلمة المرور مسبقاً';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'خطأ في الاتصال بالسيرفر';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'تعيين كلمة المرور';
            }
        });
        
        // ملء رقم الهاتف تلقائياً من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const phoneParam = urlParams.get('phone');
        if (phoneParam) {
            document.getElementById('phone').value = phoneParam;
        }
    </script>
</body>
</html>
